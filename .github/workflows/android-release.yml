name: Android Signed Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-signed-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Capacitor CLI now requires Node >=22; select latest LTS.
          # caching requires a lock file (package-lock.json, yarn.lock, etc.)
          # this repo does not commit one, so we skip the cache step to avoid
          # the "Dependencies lock file is not found" error.

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.keystore

      - name: Prepare web assets into www
        run: |
          rm -rf www
          mkdir -p www
          # only copy the web-facing resources needed by the app; skip images folder
          if command -v rsync >/dev/null 2>&1; then
            rsync -a --exclude='assets/images' assets/ www/assets/
          else
            cp -R assets www/ 2>/dev/null || true
            rm -rf www/assets/images 2>/dev/null || true
          fi
          cp -R src www/ 2>/dev/null || true
          cp game.html www/ 2>/dev/null || true
          cp index.html www/ 2>/dev/null || true
          cp rules.html www/ 2>/dev/null || true

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build signed Release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing signing secrets: ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD"
            exit 1
          fi
          ./gradlew assembleRelease --stacktrace \
            -Pandroid.injected.signing.store.file=$RUNNER_TEMP/release.keystore \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD

      - name: Upload signed Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: |
            android/app/build/outputs/apk/release/*.apk

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-signed-apk
          path: ./artifacts

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Matchstick Puzzle Solver v${{ steps.version.outputs.version }}
          body: |
            Automated release of signed Android APK for version ${{ steps.version.outputs.version }}.
            - Includes latest puzzle solver features and UI improvements.
          files: ./artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
